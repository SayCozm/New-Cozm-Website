<!DOCTYPE html>
<html class="staticrypt-html">
<head>
  <meta charset="utf-8">
  <title>Password Required</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="cache-control" content="max-age=0">
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT">
  <meta http-equiv="pragma" content="no-cache">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .staticrypt-html, .staticrypt-body { height: 100%; }

    .staticrypt-body {
      font-family: 'Inter', 'Arial', sans-serif;
      background: #0D1021;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(64,174,188,0.08), transparent 70%);
    }

    .hidden { display: none !important; }

    /* Loading spinner */
    .staticrypt-spinner-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D1021;
    }
    .staticrypt-spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid rgba(64,174,188,0.25);
      border-top-color: #40AEBC;
      border-radius: 50%;
      animation: cozm-spin 0.75s linear infinite;
    }
    @keyframes cozm-spin { to { transform: rotate(360deg); } }

    /* Password card */
    .staticrypt-content {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .staticrypt-form {
      background: #ffffff;
      border-radius: 20px;
      padding: 3rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(64,174,188,0.1);
    }

    .cozm-logo {
      width: 130px;
      height: auto;
      display: block;
      margin: 0 auto 1.75rem;
    }

    .staticrypt-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #181C31;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .staticrypt-instructions {
      font-size: 0.88rem;
      color: #6B7280;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .staticrypt-hr {
      border: 0;
      border-top: 1px solid #F0F0F4;
      margin-bottom: 1.5rem;
    }

    /* Password input */
    .staticrypt-password-container {
      position: relative;
      margin-bottom: 1rem;
    }

    .staticrypt-form input[type="password"],
    .staticrypt-form input[type="text"] {
      width: 100%;
      padding: 0.875rem 2.75rem 0.875rem 1rem;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      font-family: 'Inter', 'Arial', sans-serif;
      font-size: 0.95rem;
      color: #181C31;
      background: #FAFAFA;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .staticrypt-form input[type="password"]:focus,
    .staticrypt-form input[type="text"]:focus {
      border-color: #40AEBC;
      background: #fff;
    }

    .staticrypt-toggle-password-visibility {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      width: 18px;
      height: 18px;
      opacity: 0.45;
      transition: opacity 0.15s;
    }
    .staticrypt-toggle-password-visibility:hover { opacity: 0.8; }

    /* Submit button */
    .staticrypt-decrypt-button {
      width: 100%;
      padding: 0.9rem;
      background: #40AEBC;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', 'Arial', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
      text-transform: none;
    }
    .staticrypt-decrypt-button:hover { background: #38A0AE; }
    .staticrypt-decrypt-button:active { transform: scale(0.99); }

    /* Remember me */
    label.staticrypt-remember {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.82rem;
      color: #6B7280;
      cursor: pointer;
    }
    .staticrypt-remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #40AEBC;
    }

    .cozm-footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #9CA3AF;
    }
  </style>
</head>
