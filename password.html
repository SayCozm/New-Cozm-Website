<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cozm — Access Required</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #181C31;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }
    .logo {
      width: 140px;
      margin: 0 auto 2rem;
      display: block;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #181C31;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #83849E;
      margin-bottom: 2rem;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #EEEEEE;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: #181C31;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #40AEBC;
    }
    button {
      width: 100%;
      padding: 0.85rem;
      background: #40AEBC;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3FAFBE; }
    .error {
      display: none;
      margin-top: 1rem;
      color: #BD4040;
      font-size: 0.85rem;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo-transparent.png" alt="The Cozm" class="logo">
    <h1>Password Required</h1>
    <p>This site is password protected. Please enter the password to continue.</p>
    <form id="loginForm">
      <div class="input-wrap">
        <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" autofocus>
      </div>
      <button type="submit">Continue</button>
      <p class="error" id="errorMsg">Incorrect password. Please try again.</p>
    </form>
  </div>

  <script>
    var CORRECT_HASH = 'dec486c3447a5eafc53f3bef905bf306b37311f29ab0be278114fb07e029b5fa';

    async function sha256(message) {
      var msgBuffer = new TextEncoder().encode(message);
      var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    function getRedirectUrl() {
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      if (redirect && redirect.startsWith('/') && !redirect.startsWith('//')) {
        return redirect;
      }
      return 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var password = document.getElementById('passwordInput').value;
      var hash = await sha256(password);
      if (hash === CORRECT_HASH) {
        sessionStorage.setItem('cozm_auth', 'true');
        window.location.href = getRedirectUrl();
      } else {
        document.getElementById('errorMsg').classList.add('show');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    });
  </script>
</body>
</html>
